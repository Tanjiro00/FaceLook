version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        - NEXT_PUBLIC_STRIPE_BASIC_PRICE_ID=${NEXT_PUBLIC_STRIPE_BASIC_PRICE_ID:-}
        - NEXT_PUBLIC_STRIPE_PREMIUM_PRICE_ID=${NEXT_PUBLIC_STRIPE_PREMIUM_PRICE_ID:-}
        - NEXT_PUBLIC_STRIPE_PPU_PRICE_ID=${NEXT_PUBLIC_STRIPE_PPU_PRICE_ID:-}
    container_name: facelook
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
